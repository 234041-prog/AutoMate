<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoMate – التشخيص الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Oxanium:wght@400;600;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --navy:#0a0f1e; --deep:#0d1b3e; --mid:#102a6b;
  --accent:#1e90ff; --accent2:#4fb3ff;
  --silver:#c8d6e5; --dim:#7a91a8;
  --white:#f0f6ff; --glow:rgba(30,144,255,0.35);
  --card:rgba(13,27,62,0.55);
  --border:rgba(30,144,255,0.15);
}
body {
  font-family:'Cairo',sans-serif;
  background:var(--navy);
  color:var(--white);
  min-height:100vh;
  direction:rtl;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(30,144,255,0.055) 1px, transparent 1px),
    linear-gradient(90deg,rgba(30,144,255,0.055) 1px, transparent 1px);
  background-size:55px 55px;
  mask-image:radial-gradient(ellipse 90% 80% at 50% 20%, black 20%, transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 90% 80% at 50% 20%, black 20%, transparent 100%);
  pointer-events:none; z-index:0;
}
.page { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:2rem 1.5rem 4rem; }

/* NAV */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:1.2rem 0 2.5rem; }
.logo { font-family:'Oxanium',sans-serif; font-size:1.6rem; font-weight:800; color:var(--accent); letter-spacing:2px; text-decoration:none; }
.logo span { color:var(--white); }
.back-btn {
  background:transparent; border:1px solid var(--border);
  color:var(--dim); padding:0.45rem 1.1rem; border-radius:6px;
  font-family:'Cairo',sans-serif; font-size:0.9rem; cursor:pointer; transition:all 0.3s;
}
.back-btn:hover { border-color:var(--accent); color:var(--accent); }

/* HEADER */
.page-header { text-align:center; margin-bottom:2.5rem; }
.page-tag {
  display:inline-block; font-family:'Oxanium',sans-serif;
  font-size:0.72rem; letter-spacing:3px; text-transform:uppercase;
  color:var(--accent); margin-bottom:0.7rem;
}
.page-header h1 { font-size:clamp(1.8rem,4vw,2.8rem); font-weight:900; margin-bottom:0.6rem; }
.page-header p { color:var(--dim); font-size:1rem; line-height:1.7; }

/* CARD */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:2rem;
  backdrop-filter:blur(12px); margin-bottom:1.5rem; transition:border-color 0.3s;
}
.card:hover { border-color:rgba(30,144,255,0.28); }
.card-title { font-size:1rem; font-weight:700; color:var(--accent2); margin-bottom:1.2rem; display:flex; align-items:center; gap:0.5rem; }

/* TEXTAREA */
.desc-area {
  width:100%; background:rgba(10,15,30,0.6);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-family:'Cairo',sans-serif;
  font-size:1rem; line-height:1.7; padding:1rem;
  resize:vertical; min-height:110px; transition:border-color 0.3s; outline:none;
}
.desc-area:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(30,144,255,0.1); }
.desc-area::placeholder { color:var(--dim); }

/* UPLOAD */
.upload-zone {
  border:2px dashed var(--border); border-radius:10px;
  padding:1.8rem; text-align:center; cursor:pointer;
  transition:all 0.3s; position:relative;
}
.upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:rgba(30,144,255,0.04); }
.upload-zone input { display:none; }
.upload-icon { font-size:2rem; margin-bottom:0.5rem; }
.upload-label { color:var(--dim); font-size:0.95rem; }
.upload-label strong { color:var(--accent); cursor:pointer; }
.preview-wrap { margin-top:1rem; position:relative; display:inline-block; }
.preview-img { max-height:180px; border-radius:8px; border:1px solid var(--border); object-fit:cover; display:block; }
.remove-img {
  position:absolute; top:-8px; right:-8px;
  background:#ef4444; color:#fff; border:none;
  border-radius:50%; width:22px; height:22px;
  font-size:0.75rem; cursor:pointer; line-height:22px; text-align:center;
}

/* SUBMIT */
.submit-btn {
  width:100%; padding:1.05rem; border:none; border-radius:8px;
  background:var(--accent); color:var(--navy);
  font-family:'Cairo',sans-serif; font-size:1.1rem; font-weight:700;
  cursor:pointer; transition:all 0.3s;
  box-shadow:0 0 25px rgba(30,144,255,0.35);
  display:flex; align-items:center; justify-content:center; gap:0.6rem;
}
.submit-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 35px rgba(30,144,255,0.5); }
.submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* LOADING */
.loading-wrap { text-align:center; padding:3rem 1rem; display:none; }
.scanner {
  width:90px; height:90px; margin:0 auto 1.5rem;
  border-radius:50%; border:2px solid var(--border);
  background:rgba(30,144,255,0.05);
  display:flex; align-items:center; justify-content:center;
  font-size:2.2rem; animation:spin-glow 1.8s linear infinite;
}
@keyframes spin-glow {
  0%   { box-shadow:0 0 0 0 rgba(30,144,255,0.5); }
  50%  { box-shadow:0 0 0 16px rgba(30,144,255,0); }
  100% { box-shadow:0 0 0 0 rgba(30,144,255,0); }
}
.loading-steps { display:flex; flex-direction:column; gap:0.5rem; margin-top:1.5rem; }
.loading-step { display:flex; align-items:center; gap:0.7rem; color:var(--dim); font-size:0.92rem; justify-content:center; transition:color 0.4s; }
.loading-step.active { color:var(--accent); }
.loading-step.done   { color:#22c55e; }
.dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* RESULTS */
.results-section { display:none; }
.results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
.severity-badge {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.4rem 1rem; border-radius:20px;
  font-size:0.9rem; font-weight:700; border:1px solid currentColor;
}
.urgency-tag {
  font-size:0.85rem; color:var(--dim);
  background:rgba(30,144,255,0.06); border:1px solid var(--border);
  padding:0.35rem 0.9rem; border-radius:6px;
}

/* FAULTS */
.fault-item {
  display:flex; align-items:center; gap:1rem; padding:1rem;
  border-radius:8px; background:rgba(10,15,30,0.4);
  border:1px solid var(--border); margin-bottom:0.75rem; transition:all 0.3s;
}
.fault-item:hover { border-color:rgba(30,144,255,0.3); }
.fault-prob {
  flex-shrink:0; width:52px; height:52px; border-radius:50%;
  background:rgba(30,144,255,0.1); border:2px solid var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-family:'Oxanium',sans-serif; font-weight:800; font-size:0.88rem; color:var(--accent);
}
.fault-info { flex:1; }
.fault-info h4 { font-size:1rem; font-weight:700; margin-bottom:0.2rem; }
.fault-info p  { color:var(--dim); font-size:0.88rem; line-height:1.5; }
.prob-bar-bg { height:5px; background:rgba(30,144,255,0.1); border-radius:3px; overflow:hidden; margin-top:0.5rem; }
.prob-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width 1s ease; width:0; }

/* PRICE */
.price-box { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
.price-range { font-family:'Oxanium',sans-serif; font-size:2rem; font-weight:800; color:var(--accent); }
.price-note { color:var(--dim); font-size:0.88rem; line-height:1.5; max-width:380px; }

/* STEPS */
.step-item { display:flex; gap:1rem; align-items:flex-start; margin-bottom:1rem; }
.step-num-circle {
  flex-shrink:0; width:32px; height:32px; border-radius:50%;
  background:rgba(30,144,255,0.12); border:1px solid rgba(30,144,255,0.3);
  display:flex; align-items:center; justify-content:center;
  font-family:'Oxanium',sans-serif; font-size:0.8rem; font-weight:700;
  color:var(--accent); margin-top:2px;
}
.step-text h4 { font-size:0.97rem; font-weight:700; margin-bottom:0.2rem; }
.step-text p  { color:var(--dim); font-size:0.88rem; line-height:1.55; }

/* WORKSHOPS */
.workshop-card {
  background:rgba(10,15,30,0.5); border:1px solid var(--border);
  border-radius:10px; padding:1.1rem 1.2rem;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:0.8rem; margin-bottom:0.75rem; transition:all 0.3s;
}
.workshop-card:hover { border-color:rgba(30,144,255,0.35); transform:translateX(-3px); }
.workshop-info h4 { font-size:1rem; font-weight:700; }
.workshop-info p  { color:var(--dim); font-size:0.85rem; }
.workshop-meta { display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; }
.rating { color:#f59e0b; font-size:0.88rem; font-weight:700; }
.distance { color:var(--dim); font-size:0.82rem; }
.book-btn {
  background:var(--accent); color:var(--navy); border:none; border-radius:6px;
  padding:0.45rem 1.1rem; font-family:'Cairo',sans-serif; font-size:0.88rem;
  font-weight:700; cursor:pointer; transition:all 0.3s;
}
.book-btn:hover { box-shadow:0 0 15px rgba(30,144,255,0.4); transform:scale(1.04); }

/* RESET */
.reset-btn {
  width:100%; margin-top:1rem; padding:0.8rem;
  background:transparent; border:1px solid var(--border);
  color:var(--dim); border-radius:8px;
  font-family:'Cairo',sans-serif; font-size:0.95rem;
  cursor:pointer; transition:all 0.3s;
}
.reset-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ERROR */
.error-box {
  background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.3);
  border-radius:10px; padding:1.2rem; color:#fca5a5;
  font-size:0.95rem; line-height:1.6; text-align:center; margin-bottom:1rem; display:none;
}

/* API KEY */
.api-key-section { margin-bottom:1.5rem; }
.api-key-input {
  width:100%; background:rgba(10,15,30,0.6);
  border:1px solid var(--border); border-radius:8px;
  color:var(--white); font-family:'Cairo',sans-serif;
  font-size:0.95rem; padding:0.8rem 1rem;
  outline:none; transition:border-color 0.3s;
  direction:ltr; letter-spacing:1px;
}
.api-key-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(30,144,255,0.1); }
.api-key-input::placeholder { color:var(--dim); letter-spacing:0; direction:rtl; }
.api-key-note { color:var(--dim); font-size:0.8rem; margin-top:0.5rem; line-height:1.5; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}
.fade-up { animation:fadeUp 0.55s ease forwards; }

@media(max-width:600px) {
  .price-box { flex-direction:column; }
  .workshop-card { flex-direction:column; }
  .workshop-meta { align-items:flex-start; }
}
</style>
</head>
<body>
<div class="page">

  <!-- TOP BAR -->
  <button class="back-btn" onclick="goBack()">← العودة للرئيسية</button>

<script>
function goBack() {
  if (document.referrer && document.referrer !== window.location.href) {
    history.back();
  } else {
    window.location.href = "index.html";
  }
}
</script>

  <!-- INPUT SECTION -->
  <div id="inputSection">
    <div class="page-header fade-up">
      <div class="page-tag">◈ التشخيص الذكي</div>
      <h1>اكتشف عطل سيارتك الآن</h1>
      <p>صف المشكلة أو ارفع صورة — وسيحللها الذكاء الاصطناعي خلال ثوانٍ</p>
    </div>

    <!-- API KEY -->
    

    <!-- DESCRIPTION -->
    <div class="card fade-up">
      <div class="card-title">📝 وصف المشكلة</div>
      <textarea id="description" class="desc-area" placeholder="مثال: أسمع صوتاً غريباً من المحرك عند تشغيل السيارة صباحاً، خاصة في الجو البارد..." rows="4"></textarea>
    </div>

    <!-- IMAGE UPLOAD -->
    <div class="card fade-up">
      <div class="card-title">📷 رفع صورة (اختياري)</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*">
        <div id="uploadPlaceholder">
          <div class="upload-icon">🖼️</div>
          <div class="upload-label">
            <strong onclick="document.getElementById('fileInput').click()">اسحب الصورة هنا</strong> أو انقر للاختيار<br>
            <span style="font-size:0.82rem">PNG, JPG, WEBP</span>
          </div>
        </div>
        <div id="previewWrap" class="preview-wrap" style="display:none">
          <img id="previewImg" class="preview-img" alt="preview">
          <button class="remove-img" onclick="removeImage()">✕</button>
        </div>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="submit-btn" id="submitBtn" onclick="startDiagnosis()">
      🔍 ابدأ التشخيص الآن
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading-wrap" id="loadingSection">
    <div class="scanner">🔧</div>
    <div style="font-weight:700; font-size:1.1rem">جاري تحليل سيارتك...</div>
    <div class="loading-steps" id="loadingSteps"></div>
  </div>

  <!-- RESULTS -->
  <div class="results-section" id="resultsSection"></div>

</div>

<script>
const LOAD_STEPS = [
  "تحليل وصف المشكلة...",
  "فحص الصورة بالذكاء الاصطناعي...",
  "تحديد الأعطال المحتملة...",
  "تقدير التكاليف...",
  "البحث عن ورش مناسبة..."
];

const SEVERITY = {
  low:      { label:"منخفض", color:"#22c55e", bg:"rgba(34,197,94,0.1)",   icon:"🟢" },
  medium:   { label:"متوسط", color:"#f59e0b", bg:"rgba(245,158,11,0.1)",  icon:"🟡" },
  high:     { label:"عالي",  color:"#ef4444", bg:"rgba(239,68,68,0.1)",   icon:"🔴" },
  critical: { label:"حرج",   color:"#dc2626", bg:"rgba(220,38,38,0.15)",  icon:"🚨" }
};

const SYSTEM_PROMPT = `أنت خبير ميكانيكي سيارات محترف ومتخصص في تشخيص الأعطال.
تحدث بالعربية الفصحى البسيطة. عند استلام وصف المشكلة أو صورة، قدّم تقريراً شاملاً بتنسيق JSON فقط — لا تضف أي نص خارج JSON.

البنية المطلوبة:
{
  "severity": "low|medium|high|critical",
  "summary": "ملخص قصير للمشكلة (جملة واحدة)",
  "faults": [
    { "name": "اسم العطل", "probability": 85, "description": "وصف مختصر" }
  ],
  "priceEstimate": { "min": 150, "max": 400, "currency": "ريال", "note": "ملاحظة عن التسعير" },
  "repairSteps": [
    { "step": 1, "title": "عنوان الخطوة", "description": "وصف الخطوة" }
  ],
  "workshops": [
    { "name": "اسم الورشة", "specialty": "التخصص", "rating": 4.8, "distance": "2.3 كم", "phone": "0501234567" }
  ],
  "urgency": "يمكن الانتظار أسبوعاً|يجب الإصلاح خلال 3 أيام|إصلاح عاجل جداً"
}

faults: 2-4 أعطال محتملة مرتبة حسب الاحتمالية.
workshops: 3 ورش مقترحة واقعية مناسبة للسعودية.
repairSteps: 4-6 خطوات.`;

let imageFile = null;
let loadInterval = null;
let currentStep = 0;

// ── Upload logic ─────────────────────────────────────────
const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

zone.addEventListener('click', () => fileInput.click());
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  imageFile = file;
  const url = URL.createObjectURL(file);
  document.getElementById('previewImg').src = url;
  document.getElementById('uploadPlaceholder').style.display = 'none';
  document.getElementById('previewWrap').style.display = 'inline-block';
}

function removeImage() {
  imageFile = null;
  fileInput.value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadPlaceholder').style.display = 'block';
}

// ── File to base64 ────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('فشل قراءة الملف'));
    r.readAsDataURL(file);
  });
}

// ── Loading animation ─────────────────────────────────────
function startLoadingAnim() {
  currentStep = 0;
  const wrap = document.getElementById('loadingSteps');
  wrap.innerHTML = LOAD_STEPS.map((s, i) =>
    `<div class="loading-step${i===0?' active':''}" id="lstep${i}"><div class="dot"></div><span>${s}</span></div>`
  ).join('');

  loadInterval = setInterval(() => {
    const prev = document.getElementById('lstep' + currentStep);
    if (prev) { prev.classList.remove('active'); prev.classList.add('done'); prev.querySelector('span').textContent = '✓ ' + LOAD_STEPS[currentStep]; }
    currentStep++;
    if (currentStep < LOAD_STEPS.length) {
      const next = document.getElementById('lstep' + currentStep);
      if (next) next.classList.add('active');
    } else {
      clearInterval(loadInterval);
    }
  }, 900);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

// ── Main diagnosis ────────────────────────────────────────
async function startDiagnosis() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const description = document.getElementById('description').value.trim();
  hideError();

  if (!apiKey) { showError('من فضلك أدخل مفتاح الـ API أولاً.'); return; }
  if (!description && !imageFile) { showError('من فضلك اكتب وصفاً للمشكلة أو ارفع صورة.'); return; }

  // switch views
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('loadingSection').style.display = 'block';
  document.getElementById('resultsSection').style.display = 'none';
  startLoadingAnim();

  try {
    const userContent = [];
    if (imageFile) {
      const b64 = await fileToBase64(imageFile);
      userContent.push({ type:'image', source:{ type:'base64', media_type: imageFile.type, data: b64 } });
    }
    userContent.push({
      type:'text',
      text: description ? `المشكلة التي يواجهها صاحب السيارة: ${description}` : 'يرجى تشخيص المشكلة الواضحة في الصورة المرفقة.'
    });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: [{ role:'user', content: userContent }]
      })
    });

    clearInterval(loadInterval);
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'خطأ في الاتصال بالـ API');
    }

    const text = (data.content || []).map(b => b.text || '').join('');
    const cleaned = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(cleaned);

    setTimeout(() => {
      document.getElementById('loadingSection').style.display = 'none';
      renderResults(result);
    }, 500);

  } catch (err) {
    clearInterval(loadInterval);
    document.getElementById('loadingSection').style.display = 'none';
    document.getElementById('inputSection').style.display = 'block';
    showError(err.message || 'حدث خطأ. تأكد من صحة الـ API Key والاتصال بالإنترنت.');
  }
}

// ── Render results ────────────────────────────────────────
function renderResults(r) {
  const sev = SEVERITY[r.severity] || SEVERITY.medium;
  const section = document.getElementById('resultsSection');
  section.style.display = 'block';
  section.classList.add('fade-up');

  section.innerHTML = `
    <!-- Header -->
    <div class="results-header">
      <div>
        <div class="page-tag">◈ نتائج التشخيص</div>
        <h2 style="font-size:1.5rem;font-weight:900">${r.summary}</h2>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem">
        <span class="severity-badge" style="color:${sev.color};background:${sev.bg};border-color:${sev.color}">
          ${sev.icon} مستوى الخطورة: ${sev.label}
        </span>
        <span class="urgency-tag">⏱ ${r.urgency}</span>
      </div>
    </div>

    <!-- FAULTS -->
    <div class="card">
      <div class="card-title">🔍 الأعطال المحتملة</div>
      ${(r.faults||[]).map(f => `
        <div class="fault-item">
          <div class="fault-prob">${f.probability}%</div>
          <div class="fault-info">
            <h4>${f.name}</h4>
            <p>${f.description}</p>
            <div class="prob-bar-bg"><div class="prob-bar" data-width="${f.probability}"></div></div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- PRICE -->
    <div class="card">
      <div class="card-title">💰 تقدير تكلفة الإصلاح</div>
      <div class="price-box">
        <div class="price-range">${r.priceEstimate?.min} – ${r.priceEstimate?.max} <span style="font-size:1rem;font-weight:400">${r.priceEstimate?.currency}</span></div>
        <p class="price-note">ℹ️ ${r.priceEstimate?.note}</p>
      </div>
    </div>

    <!-- REPAIR STEPS -->
    <div class="card">
      <div class="card-title">🛠️ خطوات الإصلاح المقترحة</div>
      ${(r.repairSteps||[]).map(s => `
        <div class="step-item">
          <div class="step-num-circle">${s.step}</div>
          <div class="step-text"><h4>${s.title}</h4><p>${s.description}</p></div>
        </div>
      `).join('')}
    </div>

    <!-- WORKSHOPS -->
    <div class="card">
      <div class="card-title">📍 ورش مقترحة قريبة منك</div>
      ${(r.workshops||[]).map(w => `
        <div class="workshop-card">
          <div class="workshop-info">
            <h4>${w.name}</h4>
            <p>تخصص: ${w.specialty} · ${w.phone}</p>
          </div>
          <div class="workshop-meta">
            <span class="rating">⭐ ${w.rating}</span>
            <span class="distance">📍 ${w.distance}</span>
          </div>
          <button class="book-btn">احجز الآن</button>
        </div>
      `).join('')}
    </div>

    <button class="reset-btn" onclick="resetApp()">🔄 تشخيص مشكلة جديدة</button>
  `;

  // animate prob bars
  setTimeout(() => {
    document.querySelectorAll('.prob-bar[data-width]').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  }, 100);
}

function resetApp() {
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('resultsSection').innerHTML = '';
  document.getElementById('description').value = '';
  document.getElementById('inputSection').style.display = 'block';
  hideError();
  removeImage();
  window.scrollTo({ top:0, behavior:'smooth' });
}
</script>
</body>
</html>
